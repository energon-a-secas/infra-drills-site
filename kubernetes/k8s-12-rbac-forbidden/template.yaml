apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-reader
  template:
    metadata:
      labels:
        app: api-reader
    spec:
      serviceAccountName: app-service-account
      containers:
      - name: api-client
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          while true; do
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            echo "--- Attempting to list pods at $(date) ---"
            wget -qO- --header "Authorization: Bearer $TOKEN" --no-check-certificate \
              https://kubernetes.default.svc/api/v1/namespaces/default/pods 2>&1
            echo ""
            sleep 30
          done
