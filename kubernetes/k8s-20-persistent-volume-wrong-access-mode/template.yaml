apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-pv-0
  labels:
    type: local
spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /tmp/data-store-0
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-pv-1
  labels:
    type: local
spec:
  capacity:
    storage: 1Gi
  accessModes:
  - ReadWriteOnce
  hostPath:
    path: /tmp/data-store-1
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: data-store
spec:
  serviceName: data-store
  replicas: 2
  selector:
    matchLabels:
      app: data-store
  template:
    metadata:
      labels:
        app: data-store
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Pod $(hostname) started" >> /data/log.txt
          while true; do
            echo "$(date): $(hostname) is running" >> /data/log.txt
            cat /data/log.txt
            sleep 30
          done
        volumeMounts:
        - name: data-volume
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: manual
      resources:
        requests:
          storage: 2Gi
