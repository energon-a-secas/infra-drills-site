topic: Deployment Strategies
section: kubernetes
difficulty: intermediate
related_drills: [k8s-11-rolling-update-stuck, k8s-14-hpa-not-scaling]
questions:
  - id: deploy-01
    type: diagnose
    prompt: |
      A rolling update is stuck and no new pods are being created. The
      deployment strategy has maxUnavailable set to 0 and maxSurge set to 0.
      The desired replica count is 3 and 3 old pods are running. What is the
      problem?
    options:
      a: The deployment needs more replicas to perform a rolling update
      b: At least one of maxUnavailable or maxSurge must be greater than 0
      c: Rolling updates require a Recreate strategy to work properly
      d: The old pods need to be manually deleted before the update proceeds
    answer: b
    explanation: >
      With maxUnavailable 0, Kubernetes cannot remove any old pods. With
      maxSurge 0, it cannot create any new pods above the desired count. This
      creates a deadlock where the rollout cannot proceed. At least one of
      these values must be greater than 0 to allow the rolling update to make
      progress.

  - id: deploy-02
    type: complete
    prompt: |
      Complete the command to rollback a deployment to the previous revision:
      kubectl rollout ___ deployment/my-app
    answer: undo
    accept: [undo]
    explanation: >
      kubectl rollout undo reverts a deployment to its previous revision. You
      can specify a particular revision with --to-revision=N. Kubernetes keeps
      rollout history based on the revisionHistoryLimit field (default 10),
      allowing you to roll back to any stored revision.

  - id: deploy-03
    type: match
    prompt: |
      Match each probe or hook with its primary purpose.
    left: ["Liveness probe", "Readiness probe", "Startup probe", "preStop hook"]
    right: ["Restarts unhealthy container", "Removes pod from service endpoints", "Delays other probes during slow startup", "Runs before container stops"]
    pairs: [[0,0], [1,1], [2,2], [3,3]]
    explanation: >
      Liveness probes detect deadlocked or hung containers and trigger a
      restart. Readiness probes control whether a pod receives traffic by
      adding or removing it from service endpoints. Startup probes protect
      slow-starting containers by disabling liveness and readiness checks
      until the app is ready. The preStop hook runs a command before the
      container receives SIGTERM, useful for graceful shutdown preparation.

  - id: deploy-04
    type: diagnose
    prompt: |
      The HPA (Horizontal Pod Autoscaler) is configured for a deployment but
      shows "unknown" for current CPU utilization and never scales. Running
      kubectl top pods returns "error: Metrics API not available". What is the
      cause?
    options:
      a: The pods do not have CPU limits configured
      b: The HPA targetCPUUtilizationPercentage is set too high
      c: The metrics-server is not installed in the cluster
      d: The deployment needs at least 3 replicas for HPA to work
    answer: c
    explanation: >
      HPA relies on the Metrics API to read current CPU and memory usage. The
      metrics-server component collects resource metrics from kubelets and
      exposes them via the Metrics API. Without it, HPA cannot determine
      current utilization and will not scale. Install metrics-server with
      kubectl apply or via Helm.

  - id: deploy-05
    type: complete
    prompt: |
      Complete the command to check the status of a rolling update:
      kubectl rollout ___ deployment/my-app
    answer: status
    accept: [status]
    explanation: >
      kubectl rollout status watches a deployment rollout and reports its
      progress. It exits with code 0 when the rollout completes successfully
      or a non-zero code if it fails or times out. This is commonly used in
      CI/CD pipelines to verify that a deployment succeeded.

  - id: deploy-06
    type: diagnose
    prompt: |
      A new version is deployed and new pods are crashing immediately with an
      application error. However, the rollout continues and eventually all old
      pods are replaced with crashing new pods. The deployment has no readiness
      probe configured. Why did the rollout not stop?
    options:
      a: The deployment progressDeadlineSeconds is too high
      b: Without a readiness probe, Kubernetes considers all pods ready as soon as they start
      c: The minReadySeconds value is set to 0
      d: The deployment revision history limit is too low
    answer: b
    explanation: >
      Without a readiness probe, Kubernetes marks a pod as ready as soon as
      all containers start, even if they crash shortly after. This means the
      rolling update sees new pods as "ready" and continues replacing old
      pods. Adding a readiness probe ensures pods are only marked ready when
      the application can actually serve traffic, which would pause the
      rollout when new pods fail their health checks.

  - id: deploy-07
    type: diagnose
    prompt: |
      HPA is configured with targetCPUUtilizationPercentage of 50% and keeps
      scaling to the maximum replica count. The pods have no CPU resource
      requests defined. Actual CPU usage per pod is low (about 10m). What is
      causing the excessive scaling?
    options:
      a: The target percentage should be set higher
      b: HPA needs CPU requests on pods to calculate utilization percentage
      c: The metrics-server is reporting incorrect values
      d: The minimum replica count is set too low
    answer: b
    explanation: >
      HPA calculates CPU utilization as a percentage of the CPU request. If
      no CPU request is set, HPA cannot compute the percentage correctly and
      may report unknown or extreme values, causing it to scale to the
      maximum. Always define CPU requests on pods when using HPA so it has a
      baseline for calculating utilization.

  - id: deploy-08
    type: complete
    prompt: |
      Complete the command to set up HPA with a CPU utilization target:
      kubectl autoscale deployment my-app --min=2 --max=10 --cpu-percent=___
    answer: "80"
    accept: ["50", "70", "80"]
    explanation: >
      The --cpu-percent flag sets the target average CPU utilization across
      all pods. Common values are 50-80 percent. At 80 percent, HPA will add
      replicas when average CPU usage exceeds 80 percent of the requested CPU
      and remove replicas when it drops below. Choose a value that balances
      responsiveness with cost efficiency.
