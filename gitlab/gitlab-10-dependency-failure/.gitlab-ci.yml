stages:
  - build
  - test
  - deploy

build-app:
  stage: build
  image: alpine:latest
  script:
    - echo "Compiling application..."
    - echo "Build artifact created."

run-tests:
  stage: test
  image: alpine:latest
  needs:
    - build-app
  script:
    - echo "Running unit tests..."
    - echo "Running integration tests..."
    - echo "All tests passed."

deploy-prod:
  stage: deploy
  image: alpine:latest
  needs:
    - build-app
    - run-test
  script:
    - echo "Deploying to production..."
    - echo "Deployment complete."
